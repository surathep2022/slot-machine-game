<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel วงล้อลุ้นรางวัล</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@500;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Wheel.css">
</head>
<body>

    <div class="app-container">
        
   
<!--         
        <div class="bg-element rainbow-top"></div>
        <div class="bg-element rainbow-bottom"></div> -->
        <div class="bg-element cloud c1"></div>
        <div class="bg-element cloud c2"></div>
        <div class="bg-element cloud c3"></div> 
        <!-- <div class="bg-element cloud c4"></div>  -->


        <div class="header-box">
          <img src="header_box.png" width="60%" height="auto" alt="Logo" class="logo">
        </div>

        <div class="name-container">
            <div class="name-box">
                <h2>
                    <span class="player-name"></span>
                </h2>
            </div>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <button class="spin-btn" id="spinBtn">START</button>
        </div>

        <!-- <div class="sponser-box">
            <img src="sponsored.png" width="1000" height="600" alt="Sponser Logo">
        </div> -->

        <audio id="spin-audio" src="sound/spin.mp3"></audio>
        <audio id="win-audio" src="sound/small-win.wav"></audio>    
        
    </div>



    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="Wheel.js"></script>
</body>
</html>
